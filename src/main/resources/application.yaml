ktor:
  application:
    modules:
      - com.martdev.ApplicationKt.module
  deployment:
    port: "$ADDR:3000"

database:
  address: "DB_PART_ADDR"
  maxOpenConns: "$DB_MAX_OPEN_CONNS"
  maxIdleConns: "$DB_MAX_IDLE_CONNS"
  maxIdleTime: "$DB_MAX_IDLE_TIME"
  user: "$DB_USER"
  password: "$DB_PASSWORD"

stytch:
  stytchID: "$STYTCH_PROJECT_ID"
  stytchSecret: "$STYTCH_SECRET"

jwt:
  secret: "test"
  issuer: "com.martdev"
  audience: "newsify-users"
  expirationMinutes: "15"
